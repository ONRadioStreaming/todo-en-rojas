<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conecta2 Admin</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,.65), rgba(0,0,0,.65)),
        url('https://images.unsplash.com/photo-1556740749-887f6717d7e4?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 32px 26px;
      color: #fff;
      box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
      font-weight: bold;
      color: #ffffff;
    }

    .sub {
      text-align: center;
      margin-bottom: 28px;
      font-size: 15px;
      color: rgba(255,255,255,0.85);
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
    }

    .field input {
      width: 100%;
      padding: 14px 14px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 15px;
      background: rgba(255,255,255,0.95);
      color: #111;
    }

    .field input:focus {
      outline: 2px solid #00d26a;
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 52px;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: #222;
      cursor: pointer;
      border-radius: 8px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .toggle-password:hover {
      background: rgba(0,0,0,0.06);
      transform: translateY(-50%);
    }

    .toggle-password:focus {
      outline: 2px solid #00d26a;
    }

    .actions {
      margin-top: 22px;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #00c853;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: .2s ease;
    }

    .submit-btn:hover {
      background: #00b54a;
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      background: #7fbf94;
      cursor: not-allowed;
      transform: none;
    }

    .msg {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      min-height: 20px;
    }

    .msg.error { color: #ffb3b3; }
    .msg.ok { color: #9cffc0; }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      font-size: 14px;
      color: rgba(255,255,255,0.92);
      user-select: none;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: #00c853;
    }

    .session-note {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="logo">Conecta2 Admin</div>
    <div class="sub">Ingreso al panel de administración</div>

    <form id="loginForm">
      <div class="field">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="password-wrap">
          <input type="password" id="password" name="password" autocomplete="current-password" required />
          <button type="button" id="togglePassword" class="toggle-password" aria-label="Mostrar contraseña" title="Mostrar contraseña">👁️</button>
        </div>
      </div>

      <label class="remember">
        <input type="checkbox" id="recordarme" />
        Recordar acceso en este dispositivo
      </label>

      <div class="session-note">
        Aunque el acceso quede recordado, esta pantalla se seguirá mostrando antes de ingresar.
      </div>

      <div class="actions">
        <button type="submit" id="btnLogin" class="submit-btn">Ingresar</button>
      </div>

      <div id="mensaje" class="msg"></div>
    </form>

    <div class="footer">Panel privado · Conecta2</div>
  </div>

  <script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUCqWb6pYziwFrHWwXgSNwDfs4dt2KmdEZS18qFxcqlrSF4ywXdrDSrRM_Efka8Iij/exec";

  const loginForm = document.getElementById("loginForm");
  const btnLogin = document.getElementById("btnLogin");
  const mensaje = document.getElementById("mensaje");
  const usuarioInput = document.getElementById("usuario");
  const passwordInput = document.getElementById("password");
  const recordarmeInput = document.getElementById("recordarme");
  const togglePasswordBtn = document.getElementById("togglePassword");

  const CLAVE_RECORDAR = "conecta2_admin_recordar";
  const CLAVE_USUARIO = "conecta2_admin_usuario";
  const CLAVE_PASSWORD = "conecta2_admin_password";

  function irAlPanel() {
    window.location.href = "panel.html";
  }

  function cargarCredencialesRecordadas() {
    const recordar = localStorage.getItem(CLAVE_RECORDAR) === "true";
    const usuarioGuardado = localStorage.getItem(CLAVE_USUARIO) || "";
    const passwordGuardada = localStorage.getItem(CLAVE_PASSWORD) || "";

    recordarmeInput.checked = recordar;

    if (recordar) {
      usuarioInput.value = usuarioGuardado;
      passwordInput.value = passwordGuardada;
    }
  }

  function guardarCredencialesRecordadas() {
    if (recordarmeInput.checked) {
      localStorage.setItem(CLAVE_RECORDAR, "true");
      localStorage.setItem(CLAVE_USUARIO, usuarioInput.value.trim());
      localStorage.setItem(CLAVE_PASSWORD, passwordInput.value);
    } else {
      localStorage.removeItem(CLAVE_RECORDAR);
      localStorage.removeItem(CLAVE_USUARIO);
      localStorage.removeItem(CLAVE_PASSWORD);
    }
  }

  function mostrarMensaje(texto, tipo) {
    mensaje.textContent = texto;
    mensaje.className = "msg " + tipo;
  }

  // Cargar lo recordado al abrir
  cargarCredencialesRecordadas();

  // Si el usuario cambia el check, actualizar al toque
  recordarmeInput.addEventListener("change", function () {
    guardarCredencialesRecordadas();
  });

  // Si cambia usuario o contraseña y está tildado, guardar al toque
  usuarioInput.addEventListener("input", function () {
    if (recordarmeInput.checked) guardarCredencialesRecordadas();
  });

  passwordInput.addEventListener("input", function () {
    if (recordarmeInput.checked) guardarCredencialesRecordadas();
  });

  togglePasswordBtn.addEventListener("click", function () {
    const mostrando = passwordInput.type === "text";

    if (mostrando) {
      passwordInput.type = "password";
      togglePasswordBtn.textContent = "👁️";
      togglePasswordBtn.setAttribute("aria-label", "Mostrar contraseña");
      togglePasswordBtn.setAttribute("title", "Mostrar contraseña");
    } else {
      passwordInput.type = "text";
      togglePasswordBtn.textContent = "🙈";
      togglePasswordBtn.setAttribute("aria-label", "Ocultar contraseña");
      togglePasswordBtn.setAttribute("title", "Ocultar contraseña");
    }
  });

  loginForm.addEventListener("submit", async function(e) {
    e.preventDefault();

    const usuario = usuarioInput.value.trim();
    const password = passwordInput.value.trim();

    if (!usuario || !password) {
      mostrarMensaje("Completá usuario y contraseña.", "error");
      return;
    }

    btnLogin.disabled = true;
    btnLogin.textContent = "Ingresando...";
    mostrarMensaje("Validando acceso...", "ok");

    try {
      const formData = new FormData();
      formData.append("action", "adminLogin");
      formData.append("usuario", usuario);
      formData.append("password", password);

      const response = await fetch(SCRIPT_URL, {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      if (data.ok) {
        const session = {
          token: data.token,
          nombre: data.nombre || "",
          usuario: data.usuario || usuario,
          vencimiento: data.vencimiento || ""
        };

        localStorage.removeItem("conecta2_admin_session");
        sessionStorage.removeItem("conecta2_admin_session");

        if (recordarmeInput.checked) {
          localStorage.setItem("conecta2_admin_session", JSON.stringify(session));
        } else {
          sessionStorage.setItem("conecta2_admin_session", JSON.stringify(session));
        }

        guardarCredencialesRecordadas();

        mostrarMensaje("Acceso correcto. Redirigiendo...", "ok");

        setTimeout(() => {
          irAlPanel();
        }, 700);
      } else {
        mostrarMensaje(data.message || "Usuario o contraseña incorrectos.", "error");
      }

    } catch (error) {
      console.error(error);
      mostrarMensaje("No se pudo conectar con el servidor.", "error");
    } finally {
      btnLogin.disabled = false;
      btnLogin.textContent = "Ingresar";
    }
  });
</script>
</body>
</html>
