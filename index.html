<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo en Rojas</title>
  <style>
    :root{
      --bg1:#0f5ed7;
      --bg2:#4fb5ff;
      --panel:#f4f7fc;
      --text:#18345e;
      --shadow:0 10px 22px rgba(16,55,120,.16);
      --green:#17a34a;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      min-height:100vh;
      background:linear-gradient(180deg,var(--bg1) 0%,var(--bg2) 34%,#eaf3ff 100%);
      color:#fff;
    }

    .app{
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
    }

    .top{
      padding:18px 16px 14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .brand-logo{
      width:62px;
      height:62px;
      border-radius:18px;
      overflow:hidden;
      background:rgba(255,255,255,.18);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 8px 18px rgba(0,0,0,.12);
      flex-shrink:0;
    }

    .brand-logo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .brand-text h1{
      font-size:1.9rem;
      line-height:1;
      font-weight:800;
      margin-bottom:6px;
      letter-spacing:-.4px;
    }

    .brand-text p{
      font-size:.98rem;
      opacity:.96;
    }

    .search{
      background:#fff;
      border-radius:16px;
      padding:14px;
      display:flex;
      align-items:center;
      gap:10px;
      box-shadow:0 10px 18px rgba(11,56,130,.14);
      margin-bottom:12px;
    }

    .search input{
      border:none;
      outline:none;
      width:100%;
      font-size:1rem;
      color:#334155;
      background:transparent;
    }

    .search input::placeholder{
      color:#94a3b8;
    }

    .cta-wrap{
      margin-bottom:6px;
    }

    .cta-btn{
      width:100%;
      border:none;
      border-radius:16px;
      padding:14px 16px;
      font-size:.98rem;
      font-weight:800;
      cursor:pointer;
      background:var(--green);
      color:#fff;
      box-shadow:0 10px 18px rgba(23,163,74,.22);
    }

    .content{
      background:var(--panel);
      border-radius:26px 26px 0 0;
      min-height:calc(100vh - 120px);
      padding:18px 16px 28px;
      color:var(--text);
      box-shadow:0 -6px 20px rgba(0,0,0,.05);
    }

    .section-title{
      font-size:1.55rem;
      line-height:1.05;
      font-weight:900;
      margin-bottom:14px;
      color:#16386b;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .card{
      border:none;
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow);
      cursor:pointer;
      min-height:148px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transition:transform .15s ease;
    }

    .card:active{
      transform:scale(.98);
    }

    .card-top{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px 10px 8px;
    }

    .card-bottom{
      text-align:center;
      color:#fff;
      font-weight:800;
      font-size:1rem;
      line-height:1.08;
      padding:12px 10px 14px;
      background:rgba(255,255,255,.18);
      text-shadow:0 1px 2px rgba(0,0,0,.12);
    }

    .orange{background:linear-gradient(180deg,#ff9f1c 0%,#f38b00 100%);}
    .red{background:linear-gradient(180deg,#ff5f60 0%,#ef3b45 100%);}
    .green{background:linear-gradient(180deg,#58cc41 0%,#28a53f 100%);}
    .purple{background:linear-gradient(180deg,#c67dff 0%,#9a51e6 100%);}
    .cyan{background:linear-gradient(180deg,#5fe3ef 0%,#33bed2 100%);}
    .blue{background:linear-gradient(180deg,#90d0ff 0%,#63b4f8 100%);}
    .pink{background:linear-gradient(180deg,#ff8fd8 0%,#e161b3 100%);}
    .brown{background:linear-gradient(180deg,#d0a16d 0%,#a06f43 100%);}

    .icon-svg{
      width:76px;
      height:76px;
      display:block;
      filter:drop-shadow(0 4px 8px rgba(0,0,0,.14));
    }

    .footer-space{
      height:6px;
    }

    @media (max-width:380px){
      .brand-text h1{font-size:1.65rem;}
      .section-title{font-size:1.35rem;}
      .card{min-height:138px;}
      .card-bottom{font-size:.92rem;}
      .icon-svg{width:68px;height:68px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="brand">
        <div class="brand-logo">
          <img src="logo.png" alt="Todo en Rojas">
        </div>
        <div class="brand-text">
          <h1>Todo en Rojas</h1>
          <p>La ciudad en la palma de tu mano</p>
        </div>
      </div>

      <div class="search">
        <span>🔎</span>
        <input type="text" id="searchInput" placeholder="Buscar servicio o comercio..." />
      </div>

      <div class="cta-wrap">
        <button class="cta-btn" onclick="window.location.href='registro-prestador.html'">
          Quiero aparecer en la app
        </button>
      </div>
    </div>

    <div class="content">
      <div class="section-title">Categorías</div>

      <div class="grid" id="categoriesGrid">

        <button class="card orange" data-name="Servicios para el Hogar" onclick="irCategoria('servicios')">
          <div class="card-top">
            <svg class="icon-svg" viewBox="0 0 100 100" aria-hidden="true">
              <g transform="rotate(-35 35 35)">
                <rect x="22" y="16" width="12" height="42" rx="5" fill="#f6f7fb" stroke="#5b4333" stroke-width="2"/>
                <rect x="18" y="54" width="20" height="16" rx="4" fill="#2d7ef7" stroke="#1e4d95" stroke-width="2"/>
              </g>
              <g transform="rotate(40 62 38)">
                <rect x="56" y="20" width="10" height="36" rx="4" fill="#f6f7fb" stroke="#5b4333" stroke-width="2"/>
                <path d="M50 18 h22 v8 h-6 v8 h-10 v-8 h-6z" fill="#f6f7fb" stroke="#5b4333" stroke-width="2"/>
              </g>
            </svg>
          </div>
          <div class="card-bottom">Servicios para el Hogar</div>
        </button>

        <button class="card red" data-name="Comida" onclick="irCategoria('comida')">
          <div class="card-top">
            <svg class="icon-svg" viewBox="0 0 100 100" aria-hidden="true">
              <rect x="22" y="42" width="44" height="18" rx="8" fill="#6f3d1f" stroke="#3c2415" stroke-width="2"/>
              <rect x="20" y="34" width="48" height="12" rx="6" fill="#8bc34a"/>
              <rect x="22" y="28" width="44" height="10" rx="5" fill="#d32f2f"/>
              <path d="M18 22 q6-10 26-10 q20 0 26 10 v7 h-52z" fill="#f6c65b" stroke="#9c6b20" stroke-width="2"/>
              <circle cx="30" cy="18" r="1.7" fill="#fff4c2"/>
              <circle cx="42" cy="16" r="1.7" fill="#fff4c2"/>
              <circle cx="54" cy="18" r="1.7" fill="#fff4c2"/>
              <rect x="72" y="20" width="14" height="28" rx="2" fill="#ffffff" stroke="#c9d2dc" stroke-width="2"/>
              <rect x="72" y="36" width="14" height="12" fill="#d43d3d"/>
              <rect x="78" y="12" width="2.5" height="10" rx="1" fill="#ffffff"/>
            </svg>
          </div>
          <div class="card-bottom">Comida</div>
        </button>

        <button class="card green" data-name="Profesionales" onclick="irCategoria('profesionales')">
          <div class="card-top">
            <svg class="icon-svg" viewBox="0 0 100 100" aria-hidden="true">
              <rect x="15" y="42" width="42" height="30" rx="5" fill="#24456b" stroke="#13283f" stroke-width="2"/>
              <rect x="28" y="32" width="16" height="10" rx="2" fill="#24456b" stroke="#13283f" stroke-width="2"/>
              <rect x="52" y="54" width="24" height="6" rx="2" fill="#b9782d"/>
              <rect x="63" y="34" width="5" height="24" fill="#b9782d"/>
              <path d="M52 54 l10-14 h12 l-4 14z" fill="#d69742"/>
              <path d="M52 54 l10 14 h12 l-4-14z" fill="#c48136"/>
            </svg>
          </div>
          <div class="card-bottom">Profesionales</div>
        </button>

        <button class="card purple" data-name="Estética" onclick="irCategoria('estetica')">
          <div class="card-top">
            <svg class="icon-svg" viewBox="0 0 100 100" aria-hidden="true">
              <path d="M32 28 q18-16 36 0 l-5 18 h-26z" fill="#ffffff"/>
              <path d="M35 44 q0-18 15-18 q15 0 15 18 q0 18-15 18 q-15 0-15-18z" fill="#56b35a" stroke="#2f7d33" stroke-width="2"/>
              <ellipse cx="44" cy="43" rx="6" ry="4" fill="#f5e7c9"/>
              <ellipse cx="56" cy="43" rx="6" ry="4" fill="#f5e7c9"/>
              <path d="M46 52 q4 4 8 0" stroke="#2a4b2c" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="card-bottom">Estética</div>
        </button>

        <button class="card cyan" data-name="Salud" onclick="irCategoria('salud')">
          <div class="card-top">
            <svg class="icon-svg" viewBox="0 0 100 100" aria-hidden="true">
              <circle cx="50" cy="50" r="26" fill="#ffffff" opacity=".95"/>
              <rect x="45" y="32" width="10" height="36" rx="2" fill="#e53935"/>
              <rect x="32" y="45" width="36" height="10" rx="2" fill="#e53935"/>
              <circle cx="50" cy="50" r="28" fill="none" stroke="#d8f3f6" stroke-width="3"/>
            </svg>
          </div>
          <div class="card-bottom">Salud</div>
        </button>

        <button class="card blue" data-name="Comercios" onclick="irCategoria('comercios')">
          <div class="card-top">
            <svg class="icon-svg" viewBox="0 0 100 100" aria-hidden="true">
              <path d="M24 28 h52 l-5 14 h-42z" fill="#263238"/>
              <rect x="26" y="42" width="48" height="26" rx="4" fill="#ffffff" stroke="#9ab3c9" stroke-width="2"/>
              <rect x="30" y="46" width="18" height="22" fill="#d9eef7"/>
              <rect x="52" y="46" width="18" height="10" fill="#fff3c8"/>
              <rect x="52" y="58" width="18" height="10" fill="#ffe1e1"/>
              <rect x="38" y="26" width="24" height="6" rx="3" fill="#3f51b5"/>
            </svg>
          </div>
          <div class="card-bottom">Comercios</div>
        </button>

        <button class="card pink" data-name="Transporte" onclick="irCategoria('transporte')">
          <div class="card-top">
            <svg class="icon-svg" viewBox="0 0 100 100" aria-hidden="true">
              <path d="M24 52 q3-15 18-15 h16 q12 0 18 10 l4 5 v10 h-56z" fill="#f36c6c" stroke="#8e3e3e" stroke-width="2"/>
              <rect x="34" y="40" width="12" height="8" rx="2" fill="#bfe3ff"/>
              <rect x="48" y="40" width="12" height="8" rx="2" fill="#bfe3ff"/>
              <circle cx="36" cy="65" r="6" fill="#37474f"/>
              <circle cx="68" cy="65" r="6" fill="#37474f"/>
              <circle cx="36" cy="65" r="2.5" fill="#cfd8dc"/>
              <circle cx="68" cy="65" r="2.5" fill="#cfd8dc"/>
            </svg>
          </div>
          <div class="card-bottom">Transporte</div>
        </button>

        <button class="card brown" data-name="Eventos" onclick="irCategoria('eventos')">
          <div class="card-top">
            <svg class="icon-svg" viewBox="0 0 100 100" aria-hidden="true">
              <path d="M50 18 l6 16 h17 l-14 10 l5 17 l-14-10 l-14 10 l5-17 l-14-10 h17z" fill="#ffd54f" stroke="#b8860b" stroke-width="2"/>
              <circle cx="28" cy="56" r="4" fill="#ff6fa9"/>
              <circle cx="74" cy="60" r="4" fill="#61dafb"/>
              <circle cx="34" cy="28" r="3.5" fill="#a0e05a"/>
              <circle cx="72" cy="28" r="3.5" fill="#ffffff"/>
            </svg>
          </div>
          <div class="card-bottom">Eventos</div>
        </button>

      </div>

      <div class="footer-space"></div>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById("searchInput");
    const cards = document.querySelectorAll(".card");

    searchInput.addEventListener("input", function () {
      const value = this.value.toLowerCase().trim();

      cards.forEach((card) => {
        const text = card.dataset.name.toLowerCase();
        card.style.display = text.includes(value) ? "flex" : "none";
      });
    });

    function irCategoria(cat){
      const rutas = {
        servicios: "servicios.html",
        comida: "comida.html",
        profesionales: "profesionales.html",
        estetica: "estetica.html",
        salud: "salud.html",
        comercios: "comercios.html",
        transporte: "transporte.html",
        eventos: "eventos.html"
      };

      if (rutas[cat]) {
        window.location.href = rutas[cat];
      }
    }
  </script>
</body>
</html>
