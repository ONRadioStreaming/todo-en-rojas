<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categoría | Conecta2</title>
  <meta name="theme-color" content="#07142b" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap');

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Manrope', Arial, sans-serif;
      background: #07142b;
      color: #fff;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(29, 211, 209, 0.14), transparent 28%),
        linear-gradient(180deg, #041126 0%, #071b3a 38%, #0c6f8d 100%);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .app {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .top-wrap {
      padding: 16px;
    }

    .hero-box {
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.16);
      backdrop-filter: blur(4px);
    }

    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .back-btn {
      border: 0;
      background: rgba(255,255,255,0.14);
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-title {
      margin: 0;
      font-size: 1.28rem;
      line-height: 1.1;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .hero-subtitle {
      margin: 6px 0 0 0;
      color: rgba(255,255,255,0.86);
      font-size: .94rem;
      line-height: 1.45;
      font-weight: 700;
    }

    .content {
      background: #eef4f7;
      color: #11253d;
      border-radius: 32px 32px 0 0;
      padding: 22px 16px 30px;
      min-height: 70vh;
    }

    .filters-card {
      background: #fff;
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    .filters-title {
      margin: 0 0 12px 0;
      font-size: 1rem;
      font-weight: 800;
      color: #12304d;
    }

    .field {
      margin-bottom: 12px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: .86rem;
      font-weight: 800;
      color: #42596f;
    }

    .field select {
      width: 100%;
      border: 1px solid #d7e3eb;
      outline: none;
      border-radius: 16px;
      padding: 14px 12px;
      font-size: .96rem;
      font-weight: 700;
      font-family: inherit;
      background: #f9fcff;
      color: #16324d;
    }

    .results-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .results-head h2 {
      margin: 0;
      font-size: 1.06rem;
      font-weight: 800;
      color: #10243d;
      letter-spacing: -0.02em;
    }

    .count-badge {
      background: #dff3fb;
      color: #0b6e92;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .8rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .cards {
      display: grid;
      gap: 14px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }

    .card-top {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 12px;
      align-items: start;
    }

    .card-photo {
      width: 84px;
      height: 84px;
      border-radius: 18px;
      object-fit: cover;
      display: block;
      background: #dfe8ef;
    }

    .card-name {
      margin: 0;
      font-size: 1rem;
      line-height: 1.12;
      font-weight: 800;
      color: #12304d;
      letter-spacing: -0.02em;
    }

    .card-rubro {
      margin: 4px 0 0 0;
      font-size: .9rem;
      color: #587083;
      font-weight: 700;
    }

    .card-owner {
      margin: 6px 0 0 0;
      font-size: .86rem;
      color: #6b7f91;
      font-weight: 700;
    }

    .status-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: .88rem;
      font-weight: 800;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      flex: 0 0 auto;
    }

    .dot-open {
      background: #1fbf5b;
    }

    .dot-closed {
      background: #df3d3d;
    }

    .status-open {
      color: #178746;
    }

    .status-closed {
      color: #b52d2d;
    }

    .schedule-text {
      margin: 8px 0 0 0;
      color: #4f6779;
      font-size: .87rem;
      line-height: 1.4;
      font-weight: 700;
    }

    .card-desc {
      margin: 12px 0 0 0;
      color: #50697b;
      font-size: .88rem;
      line-height: 1.45;
      font-weight: 700;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-wa,
    .btn-profile {
      border: 0;
      border-radius: 16px;
      padding: 13px 12px;
      font-size: .92rem;
      font-weight: 800;
      text-align: center;
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
    }

    .btn-wa {
      background: linear-gradient(135deg, #19ad4a, #108a39);
      color: #fff;
    }

    .btn-profile {
      background: linear-gradient(135deg, #e9f0f6, #d8e4ee);
      color: #16324d;
    }

    .empty-box {
      background: #fff;
      border-radius: 24px;
      padding: 24px 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    .empty-box h3 {
      margin: 0 0 8px 0;
      font-size: 1.04rem;
      font-weight: 800;
      color: #12304d;
    }

    .empty-box p {
      margin: 0;
      color: #627789;
      font-size: .92rem;
      line-height: 1.5;
      font-weight: 700;
    }

    @media (max-width: 420px) {
      .card-top {
        grid-template-columns: 76px 1fr;
      }

      .card-photo {
        width: 76px;
        height: 76px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top-wrap">

      <div class="results-head">

          foto: "https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&w=500&q=80",

          responsable: "Presupuestos y obras",
          estado: "abierto",

          perfil: "#",
          subcategoria: "Albañilería"
        }
      ]
    };

    const params = new URLSearchParams(window.location.search);
    const categoria = params.get("cat") || "salud";

    const config = categoriaConfig[categoria] || {
      titulo: "Categoría",
      subtitulo: "Explorá opciones disponibles.",
      tipoEstado: "disponible",
      subcategorias: ["Todos"]
    };

    const categoryTitle = document.getElementById("categoryTitle");
    const categorySubtitle = document.getElementById("categorySubtitle");
    const subFilter = document.getElementById("subFilter");
    const statusFilter = document.getElementById("statusFilter");
    const cardsContainer = document.getElementById("cardsContainer");
    const countBadge = document.getElementById("countBadge");

    categoryTitle.textContent = config.titulo;
    categorySubtitle.textContent = config.subtitulo;

    subFilter.innerHTML = "";
    config.subcategorias.forEach(sub => {
      const option = document.createElement("option");
      option.value = sub.toLowerCase();
      option.textContent = sub;
      subFilter.appendChild(option);
    });

    function getEstadoTexto(item) {
      if (config.tipoEstado === "abierto") {
        return item.estado === "abierto" ? "Abierto ahora" : "Cerrado ahora";
      }
      return item.estado === "abierto" ? "Disponible ahora" : "No disponible ahora";
    }

    function getEstadoClass(item) {
      return item.estado === "abierto"
        ? { dot: "dot-open", text: "status-open" }
        : { dot: "dot-closed", text: "status-closed" };

    async function renderCards() {
  const subValue = subFilter.value;
  const statusValue = statusFilter.value;

  cardsContainer.innerHTML = `<div class="loading">Cargando resultados...</div>`;
  countBadge.textContent = "Cargando...";

  try {
    const response = await fetch(${API_URL_BASE}?action=listarCategoria&cat=${categoria})

    if (!response.ok) {
      throw new Error(Error HTTP ${response.status});
    }

    const data = await response.json();

    const filtrados = data.filter(item => {
      const subcatItem = (item.rubro || "").toString().trim().toLowerCase();

      const pasaSub =
        subValue === "todos" ||
        subcatItem === subValue.toLowerCase();

      const pasaEstado =
        statusValue === "todos" ||
        estadoItem === statusValue.toLowerCase();

      return pasaSub && pasaEstado;
    });

    countBadge.textContent = ${filtrados.length} resultado${filtrados.length === 1 ? "" : "s"};

    if (!filtrados.length) {
      cardsContainer.innerHTML = `

          No hay resultados disponibles para los filtros seleccionados.
        </div>
      `;
      return;
    }

    cardsContainer.innerHTML = filtrados.map(item => {
      const nombre = item.nombre || "Sin nombre";
      const descripcion = item.descripcion || item.detalle || "Sin descripción disponible";

      const whatsapp = item.whatsapp || item.celular || item.telefono || "";
      const imagen = item.foto || item.imagen || item.logo || "";
      const estado = (item.estado || "activo").toLowerCase();

      const estadoClass = estadoStyles[estado]?.dot || "dot-open";
      const estadoTextClass = estadoStyles[estado]?.text || "status-open";

      return `
        <article class="card">
          <div class="card-image-wrap">
            ${
              imagen
                ? <img src="${imagen}" alt="${nombre}" class="card-image" onerror="this.style.display='none'">
                : ""
            }
          </div>

            <div class="card-top">
              <h3 class="card-title">${nombre}</h3>
              <div class="card-status ${estadoTextClass}">
                <span class="status-dot ${estadoClass}"></span>
                ${estado}
              </div>
            </div>

            <p class="card-description">${descripcion}</p>
            <p class="card-address">${direccion}</p>

            <div class="card-actions">
              ${telefono ? <a href="tel:${telefono}" class="btn-action">Llamar</a> : ""}
              ${whatsapp ? <a href="https://wa.me/${limpiarNumero(whatsapp)}" target="_blank" class="btn-action whatsapp">WhatsApp</a> : ""}
            </div>
          </div>
        </article>
      `;
    }).join("");

  } catch (error) {
    console.error("Error al cargar datos desde la API:", error);

    countBadge.textContent = "Error";
    cardsContainer.innerHTML = `
      <div class="empty-state">
        Ocurrió un error al cargar los resultados.
      </div>
    `;
  }
}
    subFilter.addEventListener("change", renderCards);
    statusFilter.addEventListener("change", renderCards);

    const API_URL_BASE = "https://script.google.com/macros/s/AKfycbxUCqWb6pYziwFrHWwXgSNwDfs4dt2KmdEZS18qFxcqlrSF4ywXdrDSrRM_Efka8Iij/exec";

</body>
</html>
