<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categoría | Conecta2</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #07111f 0%, #0b1a2f 35%, #f3f6fb 35%, #f3f6fb 100%);
      color: #0f172a;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .hero {
      background: rgba(9, 18, 37, 0.92);
      border-radius: 28px;
      color: #fff;
      padding: 24px 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 36px;
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      font-size: 18px;
      line-height: 1.4;
      color: rgba(255,255,255,0.88);
    }

    .panel {
      background: #ffffff;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .panel h2 {
      margin: 0 0 18px;
      font-size: 18px;
      color: #183b72;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #64748b;
      font-weight: 700;
    }

    .field select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #dbe3ef;
      background: #fff;
      font-size: 16px;
      outline: none;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .results-header h3 {
      margin: 0;
      font-size: 18px;
      color: #183b72;
    }

    .count-badge {
      color: #2eaadc;
      font-weight: 700;
      font-size: 16px;
    }

    .cards {
      display: grid;
      gap: 16px;
    }

    .card {
      border: 1px solid #e8eef7;
      border-radius: 22px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 4px 18px rgba(15, 23, 42, 0.06);
    }

    .card-image-wrap {
      width: 100%;
      height: 210px;
      background: #eef4fb;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 18px;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .card-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      color: #0f172a;
    }

    .card-status {
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
      border-radius: 999px;
      padding: 8px 12px;
      background: #eef7ee;
      color: #1f7a1f;
    }

    .card-desc,
    .card-address {
      margin: 0 0 10px;
      color: #475569;
      line-height: 1.5;
      font-size: 15px;
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-action {
      display: inline-block;
      text-decoration: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      background: #0f172a;
      color: #fff;
    }

    .btn-whatsapp {
      background: #25d366;
      color: #fff;
    }

    .empty-state,
    .loading-state,
    .error-state {
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      font-size: 15px;
      background: #f8fbff;
      border: 1px solid #e4edf8;
      color: #475569;
    }

    .error-state {
      color: #b91c1c;
      background: #fff5f5;
      border-color: #fecaca;
    }

    @media (max-width: 700px) {
      .hero h1 {
        font-size: 30px;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .card-image-wrap {
        height: 180px;
      }

      .card-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <a href="index.html" class="back-btn">←</a>
      <h1 id="categoryTitle">Categoría</h1>
      <p id="categorySubtitle">Explorá opciones disponibles en esta categoría.</p>
    </div>

    <div class="panel">
      <h2>Filtrar resultados</h2>

      <div class="filters">
        <div class="field">
          <label for="subFilter">Subcategoría</label>
          <select id="subFilter">
            <option value="todos">Todos</option>
          </select>
        </div>

        <div class="field">
          <label for="statusFilter">Disponibilidad</label>
          <select id="statusFilter">
            <option value="todos">Todos</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>
      </div>

      <div class="results-header">
        <h3>Resultados</h3>
        <div class="count-badge" id="countBadge">0 resultados</div>
      </div>

      <div class="cards" id="cardsContainer">
        <div class="loading-state">Cargando resultados...</div>
      </div>
    </div>
  </div>

  <script>
    const API_URL_BASE = "const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxUCqWb6pYziwFrHWwXgSNwDfs4dt2KmdEZS18qFxcqlrSF4ywXdrDSrRM_Efka8Iij/exec";";

    const categoriaConfig = {
      "oficios": {
        titulo: "Oficios",
        subtitulo: "Explorá opciones disponibles en esta categoría."
      },
      "salud": {
        titulo: "Salud",
        subtitulo: "Profesionales y servicios de salud disponibles."
      },
      "empresas-servicios": {
        titulo: "Empresas y servicios",
        subtitulo: "Soluciones empresariales y servicios disponibles."
      },
      "transporte-logistica": {
        titulo: "Transporte y logística",
        subtitulo: "Opciones disponibles para traslados, envíos y logística."
      },
      "deportes-gimnasios": {
        titulo: "Deportes y gimnasios",
        subtitulo: "Espacios y servicios para actividad física."
      }
    };

    const params = new URLSearchParams(window.location.search);
    const categoria = params.get("cat") || "oficios";

    const config = categoriaConfig[categoria] || {
      titulo: "Categoría",
      subtitulo: "Explorá opciones disponibles en esta categoría."
    };

    const categoryTitle = document.getElementById("categoryTitle");
    const categorySubtitle = document.getElementById("categorySubtitle");
    const subFilter = document.getElementById("subFilter");
    const statusFilter = document.getElementById("statusFilter");
    const cardsContainer = document.getElementById("cardsContainer");
    const countBadge = document.getElementById("countBadge");

    let datosOriginales = [];

    categoryTitle.textContent = config.titulo;
    categorySubtitle.textContent = config.subtitulo;

    function limpiarNumero(numero) {
      return String(numero || "").replace(/\D/g, "");
    }

    function capitalizar(texto) {
      if (!texto) return "";
      return texto.charAt(0).toUpperCase() + texto.slice(1);
    }

    function renderSubcategorias(data) {
      const rubros = [];
      const usados = {};

      for (let i = 0; i < data.length; i++) {
        const rubro = String(data[i].rubro || "").trim();
        const clave = rubro.toLowerCase();

        if (rubro && !usados[clave]) {
          usados[clave] = true;
          rubros.push(rubro);
        }
      }

      rubros.sort(function(a, b) {
        return a.localeCompare(b);
      });

      let html = '<option value="todos">Todos</option>';

      for (let i = 0; i < rubros.length; i++) {
        html += '<option value="' + rubros[i].toLowerCase() + '">' + rubros[i] + '</option>';
      }

      subFilter.innerHTML = html;
    }

    function renderCards() {
      const subValue = subFilter.value;
      const statusValue = statusFilter.value;

      const filtrados = datosOriginales.filter(function(item) {
        const subcatItem = String(item.rubro || "").trim().toLowerCase();
        const estadoItem = String(item.estado || "activo").trim().toLowerCase();

        const pasaSub = (subValue === "todos" || subcatItem === subValue);
        const pasaEstado = (statusValue === "todos" || estadoItem === statusValue);

        return pasaSub && pasaEstado;
      });

      countBadge.textContent = filtrados.length + " resultados";
      if (filtrados.length === 1) {
        countBadge.textContent = "1 resultado";
      }

      if (!filtrados.length) {
        cardsContainer.innerHTML = '<div class="empty-state">No hay resultados disponibles para los filtros seleccionados.</div>';
        return;
      }

      let html = "";

      for (let i = 0; i < filtrados.length; i++) {
        const item = filtrados[i];
        const nombre = item.nombre || "Sin nombre";
        const descripcion = item.descripcion || item.detalle || "Sin descripción disponible";
        const direccion = item.direccion || item.domicilio || "Dirección no informada";
        const telefono = item.telefono || item.celular || "";
        const whatsapp = item.whatsapp || item.celular || item.telefono || "";
        const imagen = item.foto || item.imagen || item.logo || "";
        const estado = String(item.estado || "activo").toLowerCase();

        let imagenHtml = "";
        if (imagen) {
          imagenHtml = '<img src="' + imagen + '" alt="' + nombre + '" class="card-image">';
        }

        let estadoTexto = capitalizar(estado);
        let estadoClase = 'card-status';

        html += ''
          + '<article class="card">'
          +   '<div class="card-image-wrap">' + imagenHtml + '</div>'
          +   '<div class="card-body">'
          +     '<div class="card-top">'
          +       '<h3 class="card-title">' + nombre + '</h3>'
          +       '<div class="' + estadoClase + '">' + estadoTexto + '</div>'
          +     '</div>'
          +     '<p class="card-desc">' + descripcion + '</p>'
          +     '<p class="card-address">' + direccion + '</p>'
          +     '<div class="card-actions">';

        if (telefono) {
          html += '<a class="btn-action" href="tel:' + telefono + '">Llamar</a>';
        }

        if (whatsapp) {
          html += '<a class="btn-action btn-whatsapp" target="_blank" href="https://wa.me/' + limpiarNumero(whatsapp) + '">WhatsApp</a>';
        }

        html += ''
          +     '</div>'
          +   '</div>'
          + '</article>';
      }

      cardsContainer.innerHTML = html;
    }

    async function cargarDatos() {
      cardsContainer.innerHTML = '<div class="loading-state">Cargando resultados...</div>';
      countBadge.textContent = "Cargando...";

      try {
        const url = API_URL_BASE + '?action=listarCategoria&cat=' + categoria;
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error("Error HTTP " + response.status);
        }

       const data = await response.json();
console.log("Respuesta listarCategoria:", data);

if (Array.isArray(data)) {
  datosOriginales = data;
} else if (data && Array.isArray(data.items)) {
  datosOriginales = data.items;
} else if (data && Array.isArray(data.resultados)) {
  datosOriginales = data.resultados;
} else if (data && Array.isArray(data.data)) {
  datosOriginales = data.data;
} else {
  throw new Error("La API no devolvió un array válido.");
}

        datosOriginales = data;
        renderSubcategorias(datosOriginales);
        renderCards();
      } catch (error) {
        console.error("Error al cargar resultados:", error);
        countBadge.textContent = "Error";
        cardsContainer.innerHTML = '<div class="error-state">Ocurrió un error al cargar los resultados.</div>';
      }
    }

    subFilter.addEventListener("change", renderCards);
    statusFilter.addEventListener("change", renderCards);

    cargarDatos();
  </script>
</body>
</html>
