<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios para el Hogar</title>

<style>
body{font-family:Arial;margin:0;background:#f3f6fb;}
.header{background:#1f5db3;color:white;padding:15px;font-weight:bold;}
.content{padding:10px;}

.tabs, .filtro{
display:flex;
gap:8px;
margin-bottom:10px;
overflow-x:auto;
}

button{
border:none;
padding:8px 12px;
border-radius:20px;
background:#e0e0e0;
cursor:pointer;
}

.active{
background:#1f5db3;
color:white;
}

.card{
background:white;
padding:12px;
border-radius:15px;
margin-bottom:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.name{font-weight:bold;}
.persona{font-size:13px;color:#666;}
.status{color:green;font-size:13px;}

</style>
</head>

<body>

<div class="header">Servicios para el Hogar</div>

<div class="content">

<div class="tabs">
<button class="tab active" data-rubro="todos">Todos</button>
<button class="tab" data-rubro="plomero">Plomeros</button>
<button class="tab" data-rubro="electricista">Electricistas</button>
<button class="tab" data-rubro="jardinero">Jardineros</button>
</div>

<div class="filtro">
<button class="estado active" data-estado="todos">Todos</button>
<button class="estado" data-estado="disponible">Disponibles</button>
</div>

<div class="card" data-rubro="plomero" data-estado="disponible">
<div class="name">Martín Gómez</div>
<div>Plomero</div>
<div class="status">Disponible ahora</div>
</div>

<div class="card" data-rubro="electricista" data-estado="disponible">
<div class="name">Electricidad Total</div>
<div>Electricista</div>
<div class="persona">Responsable: Luis Fernández</div>
<div class="status">Disponible ahora</div>
</div>

<div class="card" data-rubro="jardinero" data-estado="ocupado">
<div class="name">Guillermo Caballini</div>
<div>Corte de césped</div>
<div>Ocupado</div>
</div>

</div>

<script>
let rubro="todos"
let estado="todos"

document.querySelectorAll(".tab").forEach(b=>{
b.onclick=()=>{
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))
b.classList.add("active")
rubro=b.dataset.rubro
filtrar()
}
})

document.querySelectorAll(".estado").forEach(b=>{
b.onclick=()=>{
document.querySelectorAll(".estado").forEach(x=>x.classList.remove("active"))
b.classList.add("active")
estado=b.dataset.estado
filtrar()
}
})

function filtrar(){
document.querySelectorAll(".card").forEach(c=>{
let okRubro=(rubro=="todos"||c.dataset.rubro==rubro)
let okEstado=(estado=="todos"||c.dataset.estado=="disponible")

c.style.display=(okRubro&&okEstado)?"block":"none"
})
}
</script>

</body>
</html>
